<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: sans-serif;
      font-size: 13px;
      width: 240px;
      padding: 14px;
      margin: 0;
      color: #222;
    }
    h2 { margin: 0 0 10px; font-size: 15px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 7px;
      background: #1a7f3c;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover { background: #166334; }
    #status { margin-top: 8px; font-size: 12px; color: #555; min-height: 16px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 4px; }
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 8px;
      resize: vertical;
      min-height: 64px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <h2>NopeTube settings</h2>
  <input type="password" id="key" placeholder="OpenAI API key (sk-…)" />
  <label for="genres">Allowed genres (one per line)</label>
  <textarea id="genres" placeholder="Tech&#10;Computer Programming&#10;Cooking"></textarea>
  <label for="disallowed">Disallowed genres (one per line)</label>
  <textarea id="disallowed" placeholder="Gaming&#10;Vlogs"></textarea>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
